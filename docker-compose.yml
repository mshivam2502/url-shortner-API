version: '3.9'

services:
  postgres:
    image: postgres:latest
    container_name: postgres-urlshortner
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - spring-boot_db:/var/lib/postgresql/data  # your existing volume

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-urlshortner
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  spring-boot_db:
    external: true       # already exists
  rabbitmq_data:
    # new named volume, will be created automatically
  consul_data:
    # new named volume, will be created automatically
  pgadmin_data:
    # new named volume, will be created automatically

